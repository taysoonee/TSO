<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taylor's Schools Parent Survey</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      background-color: #f9fafb;
      color: #111827;
      font-family: 'Open Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background-color: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    i {
      color: #b20000;
      width: 48px;
      height: 48px;
      margin-bottom: 20px;
    }
    h2 {
      font-family: 'Roboto', sans-serif;
      margin-bottom: 12px;
      font-weight: 700;
    }
    p {
      color: #4b5563;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #b20000, #ff4d4d);
      color: #ffffff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-family: 'Roboto', sans-serif;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      font-size: 0.88rem;
    }
    .btn:hover {
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="card">
    <i data-lucide="clipboard-signature"></i>
    <h2>Survey Form Placeholder</h2>
    <p>This is a placeholder for your Taylor's Schools survey questionnaire. You can link this button to your existing Google Form, or paste your custom HTML questionnaire code in this file.</p>
    <a href="index.html" class="btn">
      <i data-lucide="arrow-left" style="width:14px; height:14px; color:#fff; margin:0;"></i>
      Back to Portal
    </a>
  </div>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
