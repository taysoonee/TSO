<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSO Second Brain Assistant</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Lucide Icons (CDN) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Top Header -->
    <header class="app-header">
      <div class="header-logo">
        <div class="logo-accent"></div>
        <h1>TSO Second Brain Assistant</h1>
      </div>
    </header>

    <!-- Main Workspace -->
    <main class="app-main">
      <!-- Chat Interface -->
      <section class="panel chat-panel">
        <div class="panel-header">
          <div class="panel-title">
            <i data-lucide="message-square"></i>
            <h2>Second Brain Chat</h2>
          </div>
          <div class="chat-status">
            <span class="status-dot red" id="db-status-dot"></span>
            <span id="db-status-text">Connecting...</span>
          </div>
        </div>

        <div class="chat-messages" id="chat-messages">
          <!-- Welcomes and messages dynamically generated -->
        </div>

        <div class="chat-quick-queries" id="quick-queries">
          <!-- Suggested queries inserted here -->
        </div>

        <div class="chat-input-area">
          <div class="input-wrapper">
            <textarea id="chat-input" placeholder="Ask anything about your K-12 market intelligence..." rows="1"></textarea>
            <button id="send-btn" class="send-btn" disabled>
              <i data-lucide="arrow-up"></i>
            </button>
          </div>
          <div class="chat-footer">
            <span>Powered by Gemini 3.5 Flash (v1.1.1) • Secure Google Drive Proxy</span>
            <button id="clear-chat-btn" class="text-link-btn">
              <i data-lucide="trash-2"></i> Clear Chat
            </button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Main JavaScript App -->
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
