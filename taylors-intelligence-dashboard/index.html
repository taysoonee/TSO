<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taylor's Intelligence Dashboard</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Top Header -->
    <header class="app-header">
      <div class="header-logo">
        <div class="logo-accent"></div>
        <h1>Taylor's Intelligence Dashboard</h1>
        <span class="version-badge">v1.3.6</span>
      </div>
      <div class="header-actions">
      </div>
    </header>

    <!-- Main Split Workspace -->
    <main class="app-main">
      <!-- Left: Interactive Charts -->
      <section class="panel dashboard-panel" id="left-panel">
        <div class="panel-header">
          <div class="panel-title">
            <i data-lucide="bar-chart-2"></i>
            <h2>Interactive Analytics</h2>
          </div>
          <span class="status-indicator live">Live Visualization</span>
        </div>
        <div class="panel-content" id="dashboard-wrapper">
          <!-- iframe element -->
          <iframe id="dashboard-iframe" class="dashboard-iframe" src="" frameborder="0" allowfullscreen></iframe>
        </div>
      </section>

      <!-- Drag Resizer Bar -->
      <div class="resizer" id="drag-bar">
        <div class="resizer-knob"></div>
      </div>

      <!-- Right: AI Chatbot -->
      <section class="panel chat-panel" id="right-panel">
        <div class="panel-header">
          <div class="panel-title">
            <i data-lucide="message-square"></i>
            <h2>Data Assistant</h2>
          </div>
          <div class="chat-status">
            <span class="status-dot green" id="db-status-dot"></span>
            <span id="db-status-text">Loading dataset...</span>
          </div>
        </div>

        <div class="chat-messages" id="chat-messages">
          <!-- Welcome and messages render dynamically -->
        </div>

        <div class="chat-quick-queries" id="quick-queries">
          <!-- Suggested queries Chips -->
        </div>

        <div class="chat-input-area">
          <div class="input-wrapper">
            <textarea id="chat-input" placeholder="Loading dataset... Please configure your proxy URL in settings to start." rows="1"></textarea>
            <button id="send-btn" class="send-btn" disabled>
              <i data-lucide="arrow-up"></i>
            </button>
          </div>
          <div class="chat-footer">
            <span>Powered by Gemini 3.5 Flash • Proxy Version: v1.2.3 (Secure)</span>
            <button id="clear-chat-btn" class="text-link-btn">
              <i data-lucide="trash-2"></i> Clear Chat
            </button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Settings Dialog (Modal overlay) -->


  <!-- Configuration Scripts -->
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
